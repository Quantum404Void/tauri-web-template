<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta
      name="description"
      content="Tauri 2 + Vue 3 + TypeScript dual-mode application template"
    />
    <title>Tauri Vue Template</title>
    <!-- CSP: Tauri 生产环境由 tauri.conf.json 注入；Web 环境生效 -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' ipc: http://ipc.localhost; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: asset: http://asset.localhost; connect-src 'self' ipc: http://ipc.localhost https://tauri.localhost https://updates.example.com; font-src 'self' data:"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
